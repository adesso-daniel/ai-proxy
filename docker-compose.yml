services:
  model-proxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PROXY_PROVIDER_URL=${PROXY_PROVIDER_URL}
      - PROXY_PORT=${PROXY_PORT:-3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
